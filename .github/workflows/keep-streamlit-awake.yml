name: Keep Streamlit Dashboard Awake

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  wake-streamlit:
    name: Wake Streamlit app
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      STREAMLIT_APP_URLS: ${{ vars.STREAMLIT_APP_URLS }}
      # Temporary fallback for demos if the repo variable is not configured:
      # STREAMLIT_APP_URLS: https://your-dashboard.streamlit.app

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install wake dependencies
        run: python -m pip install -r requirements-wake.txt

      - name: Wake Streamlit dashboard
        run: python scripts/wake_streamlit_app.py
